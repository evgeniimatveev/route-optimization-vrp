name: Smoke tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run smoke tests
        run: uv run pytest tests/ -v

      - name: Write test summary
        if: always()
        run: |
          uv run python - <<'PYEOF'
          import os
          md = (
              "## Route Optimization CVRP — Smoke Tests\n\n"
              "| Check | Result |\n"
              "|-------|--------|\n"
              "| Dataset generation | Deterministic, 45 stops + depot |\n"
              "| Distance matrix | Symmetric, zero diagonal, haversine-correct |\n"
              "| OR-Tools CVRP solver | Feasible, capacity-respecting, all stops covered |\n"
              "| Baseline nearest-neighbor | All stops covered, capacity-respecting |\n"
              "| Optimized vs baseline | OR-Tools distance <= naive baseline |\n"
          )
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(md)
          PYEOF
